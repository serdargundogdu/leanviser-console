name: Deploy · Cloud Run

# İSKELET: gerçek deploy için aşağıdaki repo secret'ları gerekir (henüz placeholder):
#   GCP_PROJECT  — GCP proje kimliği
#   GCP_REGION   — Cloud Run bölgesi (ör. europe-west1)
#   GCP_SA_KEY   — deploy yetkili Service Account JSON anahtarı
# Backend, Dockerfile üzerinden kaynaktan (Cloud Build) derlenip dağıtılır.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  SERVICE: leanviser-console-backend

jobs:
  deploy:
    name: Deploy backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Deploy to Cloud Run (from source)
        run: |
          gcloud run deploy "${SERVICE}" \
            --source backend \
            --project "${{ secrets.GCP_PROJECT }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated
          # Not: erişim kısıtlaması (allow-unauthenticated) sonraki turda gözden geçirilecek.
