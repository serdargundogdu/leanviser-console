name: Deploy · Cloud Run

# İSKELET: gerçek deploy için aşağıdaki repo secret'ları gerekir (henüz placeholder):
#   GCP_PROJECT  — GCP proje kimliği
#   GCP_REGION   — Cloud Run bölgesi (ör. europe-west1)
#   GCP_SA_KEY   — deploy yetkili Service Account JSON anahtarı
# Secret'lar tanımlı değilken deploy işi ATLANIR (workflow kırmızıya düşmez);
# secret'lar girilince main push veya manuel tetikte gerçek deploy çalışır.
# Backend, Dockerfile üzerinden kaynaktan (Cloud Build) derlenip dağıtılır.
#
# Opsiyonel prod wiring (tanımlı OLANLAR eklenir; yoksa varsayılanlarla çalışır):
#   CLOUDSQL_INSTANCE  — Cloud SQL bağlantı adı (PROJECT:REGION:INSTANCE).
#                        Tanımlıysa instance Cloud Run'a bağlanır ve DATABASE_URL,
#                        Secret Manager'daki "DATABASE_URL" secret'ından alınır.
#                        (Tanımsızsa: geçici SQLite — kalıcı DEĞİL.)
#   UYUMSOFT_LIVE=true — canlı entegratör: UYUMSOFT_USERNAME/PASSWORD Secret
#                        Manager'dan alınır, UYUMSOFT_ENV=live. (Tanımsızsa: test.)
#   LEANVISER_VKN / NAME / TAX_OFFICE / CITY / DISTRICT / STREET / INVOICE_SERIES
#                      — gönderici kimliği (tanımlı olanlar env olarak geçer).
# Gerekli Secret Manager secret'ları: DATABASE_URL, UYUMSOFT_USERNAME,
# UYUMSOFT_PASSWORD — SA'ya roles/secretmanager.secretAccessor verilmeli.
#
# Erişim kontrolü (varsayılan GÜVENLİ — internete auth'suz açık DEĞİL):
#   (varsayılan)        — --no-allow-unauthenticated: yalnız IAM run.invoker
#                         olanlar ya da önündeki IAP erişebilir.
#   PUBLIC_ACCESS=true  — bilinçli olarak herkese açar (--allow-unauthenticated).
#   CLOUDRUN_INGRESS    — --ingress değeri (ör. internal-and-cloud-load-balancing).
# Önerilen prod erişimi: harici HTTPS Load Balancer + IAP (Google/Workspace
# kimliğiyle), ingress=internal-and-cloud-load-balancing. Uygulama auth'u yoktur
# (tek-kiracılı); erişim kontrolü bu ağ/IAM katmanında yapılır.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  SERVICE: leanviser-console-backend

jobs:
  guard:
    name: Check GCP secrets
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          if [ -n "$GCP_SA_KEY" ] && [ -n "$GCP_PROJECT" ] && [ -n "$GCP_REGION" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "GCP secret'ları henüz tanımlı değil — deploy atlanıyor (iskelet)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy backend to Cloud Run
    needs: guard
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Deploy to Cloud Run (from source)
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          # Erişim kontrolü (varsayılan GÜVENLİ: auth'suz erişim kapalı):
          PUBLIC_ACCESS: ${{ secrets.PUBLIC_ACCESS }}
          CLOUDRUN_INGRESS: ${{ secrets.CLOUDRUN_INGRESS }}
          # Opsiyonel prod wiring (tanımlıysa eklenir; yoksa zarifçe atlanır):
          CLOUDSQL_INSTANCE: ${{ secrets.CLOUDSQL_INSTANCE }}
          UYUMSOFT_LIVE: ${{ secrets.UYUMSOFT_LIVE }}
          LEANVISER_VKN: ${{ secrets.LEANVISER_VKN }}
          LEANVISER_NAME: ${{ secrets.LEANVISER_NAME }}
          LEANVISER_TAX_OFFICE: ${{ secrets.LEANVISER_TAX_OFFICE }}
          LEANVISER_CITY: ${{ secrets.LEANVISER_CITY }}
          LEANVISER_DISTRICT: ${{ secrets.LEANVISER_DISTRICT }}
          LEANVISER_STREET: ${{ secrets.LEANVISER_STREET }}
          LEANVISER_INVOICE_SERIES: ${{ secrets.LEANVISER_INVOICE_SERIES }}
        run: |
          set -euo pipefail
          args=(run deploy "$SERVICE"
            --source backend
            --project "$GCP_PROJECT"
            --region "$GCP_REGION"
            --platform managed)

          # Erişim: varsayılan GÜVENLİ — auth'suz erişim kapalı (yalnız IAM invoker
          # / önünde IAP). PUBLIC_ACCESS=true ile bilinçli olarak herkese açılır.
          if [ "${PUBLIC_ACCESS:-}" = "true" ]; then
            args+=(--allow-unauthenticated)
          else
            args+=(--no-allow-unauthenticated)
          fi
          # Ingress: tanımlıysa uygula (önerilen prod: internal-and-cloud-load-balancing
          # -> harici HTTPS LB + IAP ile Google/Workspace kimliğiyle erişim).
          if [ -n "${CLOUDRUN_INGRESS:-}" ]; then
            args+=(--ingress "$CLOUDRUN_INGRESS")
          fi

          run_secrets=()
          run_envs=()

          # Kalıcılık: Cloud SQL instance bağla + DATABASE_URL'i Secret Manager'dan al.
          if [ -n "${CLOUDSQL_INSTANCE:-}" ]; then
            args+=(--add-cloudsql-instances "$CLOUDSQL_INSTANCE")
            run_secrets+=("DATABASE_URL=DATABASE_URL:latest")
          fi

          # Canlı entegratör: creds Secret Manager'dan, ortam=live.
          if [ "${UYUMSOFT_LIVE:-}" = "true" ]; then
            run_secrets+=("UYUMSOFT_USERNAME=UYUMSOFT_USERNAME:latest")
            run_secrets+=("UYUMSOFT_PASSWORD=UYUMSOFT_PASSWORD:latest")
            run_envs+=("UYUMSOFT_ENV=live")
          fi

          # Gönderici (LeanViser) kimliği — tanımlı olan alanlar env olarak geçer.
          for key in LEANVISER_VKN LEANVISER_NAME LEANVISER_TAX_OFFICE \
                     LEANVISER_CITY LEANVISER_DISTRICT LEANVISER_STREET \
                     LEANVISER_INVOICE_SERIES; do
            val="${!key:-}"
            if [ -n "$val" ]; then
              run_envs+=("$key=$val")
            fi
          done

          if [ "${#run_secrets[@]}" -gt 0 ]; then
            args+=(--set-secrets "$(IFS=,; echo "${run_secrets[*]}")")
          fi
          if [ "${#run_envs[@]}" -gt 0 ]; then
            args+=(--set-env-vars "$(IFS=,; echo "${run_envs[*]}")")
          fi

          gcloud "${args[@]}"
          # Erişim varsayılan kapalıdır; herkese açık servis için PUBLIC_ACCESS=true gerekir.
